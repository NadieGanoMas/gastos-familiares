<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastos Familiares</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .hidden { display: none !important; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Capa de Carga Inicial -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
        <div class="loader mb-4"></div>
        <p class="text-slate-500 font-medium">Conectando con la base de datos...</p>
    </div>

    <!-- Pantalla de Login -->
    <div id="loginScreen" class="hidden min-h-screen flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-100">
            <div class="text-center mb-10">
                <div class="inline-block p-5 bg-blue-600 rounded-3xl shadow-lg mb-6 text-4xl">📊</div>
                <h2 class="text-3xl font-black text-slate-900 tracking-tight">Acceso Familiar</h2>
                <p class="text-slate-500 mt-2">Ingresa tu nombre para comenzar</p>
            </div>
            <form id="loginForm" class="space-y-4">
                <input type="text" id="username" placeholder="Tu nombre (ej: Vasco)" required 
                    class="w-full p-5 rounded-2xl border-2 border-slate-100 bg-slate-50 text-center text-xl font-bold focus:border-blue-500 outline-none transition-all">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-2xl shadow-xl active:scale-95 transition-all">
                    Entrar al panel
                </button>
            </form>
        </div>
    </div>

    <!-- App Principal -->
    <div id="mainApp" class="hidden max-w-5xl mx-auto p-4 md:p-8">
        <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200/60">
            <div class="flex items-center gap-4">
                <div id="userAvatar" class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center text-white font-black text-xl">?</div>
                <div>
                    <h1 id="userNameDisplay" class="text-xl font-black text-slate-900">Usuario</h1>
                    <p class="text-[10px] text-green-500 font-bold uppercase tracking-widest flex items-center gap-1">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> En línea
                    </p>
                </div>
            </div>
            <button onclick="logout()" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-red-500 px-4 py-2 rounded-xl bg-slate-50">Salir</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Formulario -->
            <div class="lg:col-span-1">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200/60">
                    <h3 class="font-black text-slate-900 mb-6 flex items-center gap-2">
                        <span class="text-blue-600">➕</span> Nuevo Gasto
                    </h3>
                    <form id="expenseForm" class="space-y-5">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Mes</label>
                            <select id="month" class="w-full p-4 rounded-xl bg-slate-50 border-none font-bold text-slate-700 mt-1 focus:ring-2 focus:ring-blue-500"></select>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Categoría</label>
                            <select id="category" class="w-full p-4 rounded-xl bg-slate-50 border-none font-bold text-slate-700 mt-1 focus:ring-2 focus:ring-blue-500"></select>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Monto ($)</label>
                            <input type="number" step="0.01" id="amount" placeholder="0.00" required 
                                class="w-full p-4 rounded-xl bg-slate-50 border-none font-black text-2xl text-slate-900 mt-1 focus:ring-2 focus:ring-blue-500">
                        </div>
                        <button type="submit" id="btnSave" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black shadow-lg hover:bg-black transition-all active:scale-95">
                            Guardar Registro
                        </button>
                    </form>
                </div>
            </div>

            <!-- Dashboard -->
            <div class="lg:col-span-2 space-y-8">
                <div class="bg-blue-600 p-8 rounded-[2.5rem] shadow-xl text-white flex flex-col md:flex-row justify-between items-center gap-6">
                    <div>
                        <p class="text-blue-100 text-[10px] font-black uppercase tracking-widest mb-1">Total Acumulado</p>
                        <h2 id="totalGlobal" class="text-5xl font-black">$0.00</h2>
                    </div>
                    <div class="w-full md:w-48 h-24 bg-white/10 rounded-2xl p-2">
                        <canvas id="miniChart"></canvas>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200/60">
                    <h3 class="font-black text-slate-900 mb-6">Historial de Gastos</h3>
                    <div id="list" class="space-y-3 max-h-96 overflow-y-auto pr-2 custom-scrollbar">
                        <!-- Items cargados por JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Alerta -->
    <div id="alertModal" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl">
            <div class="text-4xl mb-4">⚠️</div>
            <h4 class="text-xl font-bold mb-2">Error de Configuración</h4>
            <p id="alertMsg" class="text-slate-500 text-sm mb-6"></p>
            <button onclick="document.getElementById('alertModal').classList.add('hidden')" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Cerrar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // CONFIGURACIÓN DE TU PROYECTO (Extraída de tus capturas)
        const firebaseConfig = {
            apiKey: "AIzaSyD8ep1IsfmQN0S_xHlTd2D26_kl_BnNaUs",
            authDomain: "gastos-familiares-f45a7.firebaseapp.com",
            projectId: "gastos-familiares-f45a7",
            storageBucket: "gastos-familiares-f45a7.firebasestorage.app",
            messagingSenderId: "691805496038",
            appId: "1:691805496038:web:d3feda723c77b2adb91127"
        };

        let db, auth, myChart, userUid;
        const appId = "app-familia-gastos";
        const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        const categories = ["🛒 Súper / Comida", "🏠 Alquiler / Casa", "🎭 Salidas / Ocio", "🚗 Movilidad", "🏥 Salud", "💡 Servicios", "🛠️ Otros"];

        const showAlert = (m) => {
            document.getElementById('alertMsg').innerText = m;
            document.getElementById('alertModal').classList.remove('hidden');
        };

        // 1. Inicializar Firebase
        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);

            onAuthStateChanged(auth, (user) => {
                document.getElementById('loadingOverlay').classList.add('hidden');
                if (user) {
                    userUid = user.uid;
                    const savedName = localStorage.getItem('user_name');
                    if (savedName) showMain(savedName);
                    else showLogin();
                } else {
                    signInAnonymously(auth).catch(e => showAlert("Error de Autenticación: Verifica que habilitaste el modo Anónimo en Firebase."));
                }
            });
        } catch (e) {
            showAlert("Error al conectar con Firebase. Revisa el código.");
        }

        // 2. Control de Vistas
        function showLogin() {
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('mainApp').classList.add('hidden');
        }

        function showMain(name) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userNameDisplay').innerText = name;
            document.getElementById('userAvatar').innerText = name.charAt(0).toUpperCase();
            startListener();
        }

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById('username').value.trim();
            if (name) {
                localStorage.setItem('user_name', name);
                showMain(name);
            }
        };

        window.logout = () => {
            localStorage.removeItem('user_name');
            location.reload();
        };

        // 3. Listener de Datos (Tiempo Real)
        function startListener() {
            // RUTA OBLIGATORIA: /artifacts/{appId}/public/data/{collection}
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'gastos');
            onSnapshot(q, (snap) => {
                const data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                render(data);
            }, (err) => {
                console.error(err);
                if (err.code === 'permission-denied') {
                    showAlert("Permiso denegado. DEBES ir a 'Firestore Database' > 'Reglas' y activar el 'Modo de Prueba'.");
                }
            });
        }

        // 4. Guardar Gasto
        document.getElementById('expenseForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSave');
            const amount = document.getElementById('amount');
            
            btn.disabled = true;
            btn.innerText = "Registrando...";

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'gastos'), {
                    month: document.getElementById('month').value,
                    category: document.getElementById('category').value,
                    amount: parseFloat(amount.value),
                    user: localStorage.getItem('user_name'),
                    date: new Date().toISOString()
                });
                amount.value = "";
            } catch (err) {
                console.error(err);
                showAlert("Error al guardar. Asegúrate de haber hecho clic en 'Crear Base de Datos' en el panel de Firebase.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Guardar Registro";
            }
        };

        window.del = (id) => confirm("¿Borrar este gasto?") && deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'gastos', id));

        // 5. Renderizado
        function render(items) {
            const list = document.getElementById('list');
            if (items.length === 0) {
                list.innerHTML = `<p class="text-center py-10 text-slate-300 italic">No hay gastos aún.</p>`;
            } else {
                list.innerHTML = items.sort((a,b) => b.date.localeCompare(a.date)).map(i => `
                    <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100 hover:bg-white hover:shadow-md transition-all">
                        <div class="flex items-center gap-3">
                            <span class="text-2xl">${i.category.split(' ')[0]}</span>
                            <div>
                                <p class="font-bold text-slate-800 text-sm">${i.category.split(' ').slice(1).join(' ')}</p>
                                <p class="text-[10px] text-slate-400 uppercase font-black">${i.month} • Por ${i.user}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-slate-900">$${i.amount.toFixed(2)}</p>
                            <button onclick="del('${i.id}')" class="text-[9px] text-red-300 font-bold hover:text-red-500 uppercase">Eliminar</button>
                        </div>
                    </div>
                `).join('');
            }

            let total = 0;
            const monthTotals = {};
            items.forEach(i => {
                total += i.amount;
                monthTotals[i.month] = (monthTotals[i.month] || 0) + i.amount;
            });
            
            document.getElementById('totalGlobal').innerText = `$${total.toLocaleString()}`;
            if (myChart) {
                myChart.data.datasets[0].data = months.map(m => monthTotals[m] || 0);
                myChart.update();
            }
        }

        // 6. Inicializar UI
        function initUI() {
            const mSelect = document.getElementById('month');
            const cSelect = document.getElementById('category');
            const currentMonth = new Date().getMonth();

            months.forEach((m, idx) => mSelect.innerHTML += `<option value="${m}" ${idx === currentMonth ? 'selected' : ''}>${m}</option>`);
            categories.forEach(c => cSelect.innerHTML += `<option value="${c}">${c}</option>`);

            const ctx = document.getElementById('miniChart');
            myChart = new Chart(ctx, {
                type: 'line',
                data: { labels: months, datasets: [{ data: Array(12).fill(0), borderColor: '#fff', borderWidth: 2, tension: 0.4, pointRadius: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
            });
        }

        initUI();
    </script>
</body>
</html>
