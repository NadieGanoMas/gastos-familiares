<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastos Familiares - Cloud Firestore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .hidden { display: none !important; }
        .btn-loading { pointer-events: none; opacity: 0.7; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Pantalla de Login -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-100">
            <div class="text-center mb-8">
                <div class="inline-block p-4 bg-indigo-600 rounded-3xl shadow-lg mb-4 text-3xl">💰</div>
                <h2 class="text-3xl font-black text-slate-900">Bienvenido</h2>
                <p class="text-slate-500 mt-2">Ingresa tu nombre para gestionar los gastos</p>
            </div>
            <form id="loginForm" class="space-y-4">
                <input type="text" id="username" placeholder="Nombre (ej: Vasco)" required 
                    class="w-full p-4 rounded-2xl border-2 border-slate-100 bg-slate-50 text-center text-xl font-bold focus:border-indigo-500 outline-none transition-all">
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-xl transition-all">
                    Ingresar al Panel
                </button>
            </form>
        </div>
    </div>

    <!-- App Principal -->
    <div id="mainApp" class="hidden max-w-6xl mx-auto p-4 md:p-8">
        <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-4">
                <div id="userAvatar" class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-inner">V</div>
                <div>
                    <h1 id="userNameDisplay" class="text-xl font-black text-slate-900">Cargando...</h1>
                    <p class="text-[10px] text-green-500 font-bold uppercase tracking-widest flex items-center gap-1">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Sistema Activo
                    </p>
                </div>
            </div>
            <button onclick="logout()" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-red-500 transition-colors">Cerrar Sesión</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Columna Formulario -->
            <div class="lg:col-span-1">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 sticky top-8">
                    <h3 class="font-black text-slate-900 mb-6 flex items-center gap-2">
                        <span class="text-indigo-600">📝</span> Nuevo Registro
                    </h3>
                    <form id="expenseForm" class="space-y-5">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Mes del Gasto</label>
                            <select id="month" class="w-full p-4 rounded-xl bg-slate-50 border-none font-bold text-slate-700 mt-1 focus:ring-2 focus:ring-indigo-500 outline-none"></select>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Categoría</label>
                            <select id="category" class="w-full p-4 rounded-xl bg-slate-50 border-none font-bold text-slate-700 mt-1 focus:ring-2 focus:ring-indigo-500 outline-none"></select>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Monto ($)</label>
                            <input type="number" step="0.01" id="amount" placeholder="0.00" required 
                                class="w-full p-4 rounded-xl bg-slate-50 border-none font-black text-2xl text-slate-900 mt-1 focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <button type="submit" id="btnSave" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black shadow-lg hover:bg-black transition-all active:scale-95">
                            Guardar Gasto
                        </button>
                    </form>
                    <p id="errorFeedback" class="text-red-500 text-[10px] font-bold mt-4 text-center hidden"></p>
                </div>
            </div>

            <!-- Columna Dashboard -->
            <div class="lg:col-span-2 space-y-8">
                <!-- Card Resumen -->
                <div class="bg-indigo-600 p-8 rounded-[2.5rem] shadow-xl text-white overflow-hidden relative">
                    <div class="relative z-10 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div>
                            <p class="text-indigo-100 text-[10px] font-black uppercase tracking-widest mb-1">Total General</p>
                            <h2 id="totalGlobal" class="text-6xl font-black tracking-tight">$0.00</h2>
                        </div>
                        <div class="w-full md:w-64 h-32 bg-white/10 rounded-3xl p-4 backdrop-blur-sm">
                            <canvas id="mainChart"></canvas>
                        </div>
                    </div>
                    <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white/5 rounded-full blur-3xl"></div>
                </div>

                <!-- Lista de Gastos -->
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-black text-slate-900">Historial Reciente</h3>
                        <span id="recordCount" class="bg-slate-100 text-slate-500 text-[10px] font-black px-3 py-1 rounded-full uppercase">0 Registros</span>
                    </div>
                    <div id="list" class="space-y-3 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                        <div class="animate-pulse flex flex-col gap-4">
                            <div class="h-16 bg-slate-100 rounded-2xl"></div>
                            <div class="h-16 bg-slate-100 rounded-2xl"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8ep1IsfmQN0S_xHlTd2D26_kl_BnNaUs",
            authDomain: "gastos-familiares-f45a7.firebaseapp.com",
            projectId: "gastos-familiares-f45a7",
            storageBucket: "gastos-familiares-f45a7.firebasestorage.app",
            messagingSenderId: "691805496038",
            appId: "1:691805496038:web:d3feda723c77b2adb91127"
        };

        const appId = "app-gastos-v1";
        const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        const categories = ["🛒 Súper / Comida", "🏠 Vivienda", "🚗 Transporte", "🎭 Entretenimiento", "🏥 Salud", "💡 Facturas", "🛠️ Otros"];

        let db, auth, myChart;

        function init() {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);

            const mSel = document.getElementById('month');
            const cSel = document.getElementById('category');
            const now = new Date();
            months.forEach((m, idx) => mSel.innerHTML += `<option value="${m}" ${idx === now.getMonth() ? 'selected' : ''}>${m}</option>`);
            categories.forEach(c => cSel.innerHTML += `<option value="${c}">${c}</option>`);

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    const savedName = localStorage.getItem('user_name');
                    if (savedName) showApp(savedName);
                } else {
                    signInAnonymously(auth);
                }
            });
            initChart();
        }

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById('username').value.trim();
            if (name) {
                localStorage.setItem('user_name', name);
                showApp(name);
            }
        };

        window.logout = () => {
            localStorage.removeItem('user_name');
            location.reload();
        };

        function showApp(name) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userNameDisplay').innerText = name;
            document.getElementById('userAvatar').innerText = name.charAt(0).toUpperCase();
            startListening();
        }

        function startListening() {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'gastos');
            onSnapshot(q, (snap) => {
                const data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                updateUI(data);
            }, (err) => {
                console.error("Error Firestore:", err);
                const feedback = document.getElementById('errorFeedback');
                feedback.classList.remove('hidden');
                feedback.innerText = "Error al conectar con la base de datos.";
            });
        }

        document.getElementById('expenseForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSave');
            const amountInput = document.getElementById('amount');
            
            btn.classList.add('btn-loading');
            btn.innerText = "Guardando...";

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'gastos'), {
                    month: document.getElementById('month').value,
                    category: document.getElementById('category').value,
                    amount: parseFloat(amountInput.value),
                    user: localStorage.getItem('user_name'),
                    timestamp: new Date().getTime()
                });
                amountInput.value = "";
            } catch (err) {
                console.error(err);
                const feedback = document.getElementById('errorFeedback');
                feedback.classList.remove('hidden');
                feedback.innerText = "Error al guardar. Intenta de nuevo.";
            } finally {
                btn.classList.remove('btn-loading');
                btn.innerText = "Guardar Gasto";
            }
        };

        window.del = (id) => {
            if(confirm("¿Seguro que quieres borrar este registro?")) {
                deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'gastos', id));
            }
        };

        function updateUI(items) {
            const list = document.getElementById('list');
            const sorted = items.sort((a,b) => b.timestamp - a.timestamp);
            document.getElementById('recordCount').innerText = `${items.length} Registros`;
            
            if (sorted.length === 0) {
                list.innerHTML = `<div class="text-center py-12 text-slate-300 italic">No hay registros aún.</div>`;
            } else {
                list.innerHTML = sorted.map(i => `
                    <div class="flex justify-between items-center p-5 bg-slate-50 rounded-3xl border border-slate-100 hover:bg-white hover:shadow-lg transition-all group">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-xl shadow-sm border border-slate-100">
                                ${i.category.split(' ')[0]}
                            </div>
                            <div>
                                <p class="font-bold text-slate-800">${i.category.split(' ').slice(1).join(' ')}</p>
                                <p class="text-[9px] text-slate-400 font-black uppercase tracking-tighter">${i.month} • Por ${i.user}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <p class="font-black text-slate-900 text-lg">$${i.amount.toFixed(2)}</p>
                            <button onclick="del('${i.id}')" class="opacity-0 group-hover:opacity-100 p-2 text-red-200 hover:text-red-500 transition-all">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>
                    </div>
                `).join('');
            }

            const total = items.reduce((acc, i) => acc + i.amount, 0);
            document.getElementById('totalGlobal').innerText = `$${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            
            const totalsByMonth = months.map(m => items.filter(i => i.month === m).reduce((acc, i) => acc + i.amount, 0));
            myChart.data.datasets[0].data = totalsByMonth;
            myChart.update();
        }

        function initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [{
                        label: 'Gasto Mensual',
                        data: Array(12).fill(0),
                        borderColor: 'rgba(255, 255, 255, 0.8)',
                        backgroundColor: 'rgba(255, 255, 255, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { display: false } }
                }
            });
        }

        init();
    </script>
</body>
</html>
