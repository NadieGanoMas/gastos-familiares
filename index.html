<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastos Familiares</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .hidden { display: none !important; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <!-- Capa de Carga -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
        <div class="loader mb-4"></div>
        <p class="text-slate-500 font-medium tracking-tight">Sincronizando con la nube...</p>
    </div>

    <!-- Pantalla de Bienvenida (Solo Nombre) -->
    <div id="loginScreen" class="hidden min-h-screen flex items-center justify-center p-6">
        <div class="max-w-md w-full glass p-10 rounded-[2.5rem] shadow-2xl border border-white">
            <div class="text-center mb-10">
                <div class="inline-block p-5 bg-blue-600 rounded-3xl shadow-lg shadow-blue-200 mb-6">
                    <span class="text-4xl">📊</span>
                </div>
                <h2 class="text-4xl font-black text-slate-900 tracking-tighter">Acceso Familiar</h2>
                <p class="text-slate-500 mt-2 font-medium">Usa tu nombre para entrar al panel</p>
            </div>
            
            <form id="loginForm" class="space-y-4">
                <div class="space-y-2">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Tu nombre de usuario</label>
                    <input type="text" id="username" placeholder="Ej: Vasco" required 
                        class="w-full p-5 rounded-2xl border-2 border-slate-100 bg-slate-50/50 text-center text-xl font-bold outline-none focus:border-blue-500 focus:bg-white transition-all">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-2xl shadow-xl shadow-blue-100 active:scale-95 transition-all flex items-center justify-center gap-2">
                    <span>Comenzar ahora</span>
                    <span class="text-lg">→</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Panel Principal -->
    <div id="mainApp" class="hidden max-w-5xl mx-auto p-4 md:p-8">
        <header class="flex justify-between items-center mb-8 bg-white p-5 rounded-[2rem] shadow-sm border border-slate-200/60">
            <div class="flex items-center gap-4">
                <div id="userAvatar" class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-lg">?</div>
                <div>
                    <h1 class="text-xl font-black text-slate-900 leading-none"><span id="userNameDisplay">Usuario</span></h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1.5 flex items-center gap-1.5">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        Sesión en línea
                    </p>
                </div>
            </div>
            <button onclick="logout()" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-red-500 transition-colors bg-slate-50 px-5 py-2.5 rounded-xl border border-transparent hover:border-red-100">
                Cerrar Sesión
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Columna Izquierda: Ingreso -->
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200/60">
                    <h3 class="font-black text-slate-900 mb-8 flex items-center gap-3 text-lg tracking-tight">
                        <span class="w-8 h-8 bg-blue-50 rounded-lg flex items-center justify-center text-blue-600 text-sm">＋</span> 
                        Nuevo Gasto
                    </h3>
                    <form id="expenseForm" class="space-y-6">
                        <div class="space-y-1.5">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Periodo</label>
                            <select id="month" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500/20 transition-all"></select>
                        </div>
                        <div class="space-y-1.5">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Categoría</label>
                            <select id="category" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500/20 transition-all"></select>
                        </div>
                        <div class="space-y-1.5">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Monto ($)</label>
                            <input type="number" step="0.01" id="amount" placeholder="0.00" required 
                                class="w-full p-5 rounded-2xl bg-slate-50 border border-slate-100 font-black text-3xl text-slate-900 outline-none focus:bg-white focus:ring-2 focus:ring-blue-500/20 transition-all">
                        </div>
                        <button type="submit" id="btnSave" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black shadow-xl hover:bg-black transition-all active:scale-[0.98]">
                            Guardar Registro
                        </button>
                    </form>
                </div>
            </div>

            <!-- Columna Derecha: Dashboard e Historial -->
            <div class="lg:col-span-2 space-y-8">
                <!-- Card de Total -->
                <div class="bg-blue-600 p-10 rounded-[2.5rem] shadow-xl shadow-blue-100 flex flex-col md:flex-row justify-between items-center gap-10 relative overflow-hidden">
                    <div class="relative z-10 text-center md:text-left">
                        <p class="text-blue-100 text-[10px] font-black uppercase tracking-[0.2em] mb-2">Total General Acumulado</p>
                        <h2 id="totalGlobal" class="text-6xl font-black text-white tracking-tighter">$0.00</h2>
                    </div>
                    <div class="w-full md:w-64 h-32 relative z-10 bg-white/10 rounded-3xl p-4 backdrop-blur-sm">
                        <canvas id="miniChart"></canvas>
                    </div>
                    <div class="absolute -left-4 -top-4 w-24 h-24 bg-white/10 rounded-full blur-3xl"></div>
                </div>

                <!-- Lista de Gastos -->
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200/60">
                    <div class="flex justify-between items-end mb-8">
                        <div>
                            <h3 class="font-black text-slate-900 text-lg tracking-tight">Historial Reciente</h3>
                            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1" id="itemCount">0 registros totales</p>
                        </div>
                    </div>
                    <div id="list" class="space-y-4 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Error -->
    <div id="errorModal" class="hidden fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl">
            <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center text-2xl mx-auto mb-4">⚠️</div>
            <h4 class="text-xl font-black text-slate-900 mb-2">Aviso del Sistema</h4>
            <p id="errorMessage" class="text-slate-500 text-sm mb-6"></p>
            <button onclick="document.getElementById('errorModal').classList.add('hidden')" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">Entendido</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8ep1IsfmQN0S_xHlTd2D26_kl_BnNaUs",
            authDomain: "gastos-familiares-f45a7.firebaseapp.com",
            projectId: "gastos-familiares-f45a7",
            storageBucket: "gastos-familiares-f45a7.firebasestorage.app",
            messagingSenderId: "691805496038",
            appId: "1:691805496038:web:d3feda723c77b2adb91127"
        };

        let db, auth, myChart, currentUser;
        const appId = "gastos-familia-v1";
        const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        const cats = ["🛒 Súper / Comida", "🏠 Alquiler / Casa", "🎭 Salidas / Ocio", "🚗 Movilidad", "🏥 Salud", "💡 Servicios", "🛠️ Otros"];

        const showError = (msg) => {
            document.getElementById('errorMessage').innerText = msg;
            document.getElementById('errorModal').classList.remove('hidden');
        };

        async function start() {
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);

                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    document.getElementById('loadingOverlay').classList.add('hidden');
                    const savedName = localStorage.getItem('user_name');
                    if (savedName && user) {
                        initApp(savedName);
                    } else {
                        document.getElementById('loginScreen').classList.remove('hidden');
                        document.getElementById('mainApp').classList.add('hidden');
                    }
                });

                await signInAnonymously(auth);
            } catch (e) {
                console.error("Error inicial:", e);
                showError("No se pudo conectar. Asegúrate de haber habilitado 'Anonymous' en Authentication.");
            }
        }

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById('username').value.trim();
            if (name) { 
                localStorage.setItem('user_name', name); 
                initApp(name); 
            }
        };

        window.logout = () => { 
            localStorage.removeItem('user_name'); 
            location.reload(); 
        };

        function initApp(name) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userNameDisplay').innerText = name;
            document.getElementById('userAvatar').innerText = name.charAt(0).toUpperCase();
            loadData();
        }

        function loadData() {
            if (!db || !currentUser) return;
            const ref = collection(db, 'artifacts', appId, 'public', 'data', 'gastos');
            onSnapshot(ref, (snap) => {
                const data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                render(data);
            }, (err) => {
                if (err.code === 'permission-denied') {
                    showError("¡Casi listo! Ve a Firestore Database > Reglas y actívalas (Modo de prueba).");
                }
            });
        }

        document.getElementById('expenseForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSave');
            const amountInput = document.getElementById('amount');
            
            if (!currentUser) {
                showError("Error: No se detecta sesión de usuario.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Registrando...";

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'gastos'), {
                    month: document.getElementById('month').value,
                    category: document.getElementById('category').value,
                    amount: parseFloat(amountInput.value),
                    user: localStorage.getItem('user_name'),
                    created: new Date().toISOString()
                });
                amountInput.value = "";
            } catch (err) {
                console.error("Error al guardar:", err);
                showError("Error al guardar. Revisa la pestaña 'Reglas' en Firestore.");
            } finally { 
                btn.disabled = false; 
                btn.innerText = "Guardar Registro";
            }
        };

        window.del = (id) => confirm("¿Deseas eliminar este registro?") && deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'gastos', id));

        function render(items) {
            const list = document.getElementById('list');
            document.getElementById('itemCount').innerText = `${items.length} registros totales`;

            if (items.length === 0) {
                list.innerHTML = `<div class="text-center py-20 text-slate-300 italic font-medium">No hay gastos registrados.</div>`;
            } else {
                list.innerHTML = items.sort((a,b) => b.created.localeCompare(a.created)).map(i => `
                    <div class="flex justify-between items-center p-5 bg-slate-50/50 rounded-3xl border border-slate-100 hover:bg-white hover:shadow-xl hover:shadow-slate-100 transition-all group">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-white rounded-2xl shadow-sm flex items-center justify-center text-xl border border-slate-50">${i.category ? i.category.split(' ')[0] : '❓'}</div>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[10px] font-black text-blue-600 uppercase tracking-tighter bg-blue-50 px-2 py-0.5 rounded-md">${i.month}</span>
                                    <span class="text-[10px] text-slate-400 font-bold uppercase tracking-tight">por ${i.user}</span>
                                </div>
                                <p class="font-bold text-slate-800 tracking-tight">${i.category ? i.category.split(' ').slice(1).join(' ') : 'Sin categoría'}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-slate-900 text-lg">$${(i.amount || 0).toFixed(2)}</p>
                            <button onclick="del('${i.id}')" class="text-[10px] text-red-400 font-bold uppercase tracking-widest hover:text-red-600 opacity-0 group-hover:opacity-100 transition-all">Borrar</button>
                        </div>
                    </div>
                `).join('');
            }

            let global = 0;
            const totalsByMonth = {};
            items.forEach(i => {
                const val = i.amount || 0;
                global += val;
                totalsByMonth[i.month] = (totalsByMonth[i.month] || 0) + val;
            });
            
            document.getElementById('totalGlobal').innerText = `$${global.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            
            if (myChart) {
                myChart.data.datasets[0].data = months.map(m => totalsByMonth[m] || 0);
                myChart.update();
            }
        }

        function initUI() {
            const mSelect = document.getElementById('month');
            const currentMonthIdx = new Date().getMonth();
            months.forEach((m, idx) => mSelect.innerHTML += `<option value="${m}" ${idx===currentMonthIdx?'selected':''}>${m}</option>`);
            
            const cSelect = document.getElementById('category');
            cats.forEach(c => cSelect.innerHTML += `<option value="${c}">${c}</option>`);

            const ctx = document.getElementById('miniChart');
            if (ctx) {
                myChart = new Chart(ctx, {
                    type: 'line',
                    data: { 
                        labels: months, 
                        datasets: [{ 
                            data: Array(12).fill(0), 
                            borderColor: '#ffffff', 
                            borderWidth: 3,
                            tension: 0.4, 
                            fill: false, 
                            pointRadius: 0 
                        }] 
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        plugins: { legend: { display: false } }, 
                        scales: { x: { display: false }, y: { display: false } } 
                    }
                });
            }
        }

        initUI();
        start();
    </script>
</body>
</html>
